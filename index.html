<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden State Press — Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lab+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #febe10;
    --green: #006838;
    --green-light: #009a4c;
    --white: #fff;
    --black: #111;
    --gray: #e8e8e8;
    --gray-dark: #bbb;
    --red: #c0392b;
    --font: 'Lab Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--yellow); color: var(--black); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* HEADER */
  header { background: var(--green); color: var(--white); padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; border-bottom: 3px solid var(--black); gap: 12px; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-logo { height: 36px; width: auto; display: block; filter: brightness(0) invert(1); }
  .header-left h1 { font-size: 1rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
  .event-name-wrap { display: flex; align-items: center; gap: 6px; }
  .event-name-wrap span { font-size: 0.7rem; opacity: 0.65; letter-spacing: 0.1em; }
  #event-name-display { font-size: 0.85rem; font-weight: 700; color: var(--yellow); letter-spacing: 0.06em; cursor: pointer; border-bottom: 1px dashed rgba(255,255,255,0.4); padding-bottom: 1px; }
  #event-name-display:hover { border-bottom-color: var(--yellow); }
  #event-name-input { font-family: var(--font); font-size: 0.85rem; font-weight: 700; background: transparent; border: none; border-bottom: 2px solid var(--yellow); color: var(--yellow); outline: none; width: 200px; padding: 1px 2px; display: none; }

  /* TABS */
  .tabs { display: flex; background: var(--black); flex-shrink: 0; }
  .tab-btn { padding: 8px 20px; font-family: var(--font); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border: none; cursor: pointer; background: var(--black); color: var(--gray-dark); border-right: 1px solid #333; transition: background 0.15s, color 0.15s; }
  .tab-btn.active { background: var(--yellow); color: var(--black); }

  /* TAB PANELS */
  .tab-panel { display: none; flex: 1; overflow: hidden; }
  .tab-panel.active { display: flex; }

  /* ── REGISTER TAB ── */
  #register-panel { flex-direction: column; }
  .register-search-bar { padding: 7px 14px; background: var(--green); border-bottom: 2px solid var(--black); flex-shrink: 0; }
  .register-search-bar input { width: 100%; max-width: 400px; padding: 5px 10px; font-family: var(--font); font-size: 0.82rem; border: 2px solid var(--black); border-radius: 3px; background: var(--white); outline: none; }
  .register-search-bar input:focus { border-color: var(--yellow); }
  .register-body { display: flex; flex: 1; overflow: hidden; }

  /* ITEM GRID */
  .item-grid-wrap { flex: 1; overflow-y: auto; padding: 10px; background: var(--yellow); border-right: 3px solid var(--black); }
  .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 7px; }
  .item-btn { display: flex; flex-direction: column; align-items: flex-start; padding: 9px 11px; border: 2.5px solid var(--black); border-radius: 4px; cursor: pointer; font-family: var(--font); font-size: 0.72rem; font-weight: 700; line-height: 1.3; text-align: left; transition: transform 0.08s, box-shadow 0.08s; user-select: none; }
  .item-btn:active { transform: scale(0.96); }
  .item-btn.mila { background: var(--yellow); color: var(--black); box-shadow: 3px 3px 0 var(--black); }
  .item-btn.merna { background: var(--green); color: var(--white); box-shadow: 3px 3px 0 var(--black); }
  .item-btn.both { background: var(--yellow); color: var(--black); border-color: var(--green); border-width: 3px; box-shadow: 3px 3px 0 var(--green); }
  .item-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--black); }
  .item-btn .price { margin-top: 4px; font-size: 0.88rem; font-weight: 700; opacity: 0.85; }
  .item-btn .seller-tag { font-size: 0.58rem; letter-spacing: 0.08em; opacity: 0.6; margin-top: 2px; text-transform: uppercase; }
  .item-btn.hidden { display: none; }
  .no-results { grid-column: 1/-1; padding: 24px; text-align: center; font-size: 0.9rem; color: var(--green); font-style: italic; }

  /* ORDER PANEL */
  .order-panel { width: 290px; flex-shrink: 0; background: var(--white); display: flex; flex-direction: column; overflow: hidden; }
  .order-header { background: var(--black); color: var(--yellow); padding: 7px 13px; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; flex-shrink: 0; }
  .order-items { flex: 1; overflow-y: auto; padding: 7px 9px; min-height: 60px; border-bottom: 2px solid var(--gray); }
  .order-empty { color: var(--gray-dark); font-size: 0.73rem; font-style: italic; padding: 10px 4px; text-align: center; }
  .order-line { display: flex; align-items: center; gap: 3px; padding: 3px 0; border-bottom: 1px solid var(--gray); font-size: 0.72rem; }
  .order-line:last-child { border-bottom: none; }
  .order-line-name { flex: 1; line-height: 1.2; }
  .order-line-price { font-weight: 700; white-space: nowrap; margin-left: 3px; }
  .qty-controls { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
  .qty-btn { width: 19px; height: 19px; border: 1.5px solid var(--black); border-radius: 3px; background: var(--gray); font-family: var(--font); font-size: 0.82rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
  .qty-btn:hover { background: var(--yellow); }
  .qty-num { min-width: 18px; text-align: center; font-weight: 700; font-size: 0.78rem; }
  .remove-btn { width: 19px; height: 19px; border: 1.5px solid var(--red); border-radius: 3px; background: #fff0f0; color: var(--red); font-family: var(--font); font-size: 0.78rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-left: 2px; }
  .remove-btn:hover { background: var(--red); color: var(--white); }
  .order-footer { padding: 9px 11px; flex-shrink: 0; display: flex; flex-direction: column; gap: 7px; font-size: 0.78rem; overflow-y: auto; }
  .subtotal-row { display: flex; justify-content: space-between; font-weight: 700; font-size: 0.95rem; padding: 5px 0; border-top: 2px solid var(--black); border-bottom: 2px solid var(--black); }
  .order-footer label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; display: block; margin-bottom: 2px; }
  .order-footer input[type="text"], .order-footer input[type="number"] { width: 100%; padding: 4px 7px; font-family: var(--font); font-size: 0.82rem; border: 2px solid var(--black); border-radius: 3px; outline: none; background: var(--white); }
  .order-footer input:focus { border-color: var(--green); }
  .payment-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .pay-btn { padding: 5px; font-family: var(--font); font-size: 0.72rem; font-weight: 700; border: 2px solid var(--black); border-radius: 3px; cursor: pointer; background: var(--gray); color: var(--black); transition: background 0.1s; letter-spacing: 0.05em; }
  .pay-btn:hover { background: var(--yellow); }
  .pay-btn.selected { background: var(--green); color: var(--white); border-color: var(--green); }
  .cash-section { display: none; flex-direction: column; gap: 5px; }
  .cash-section.visible { display: flex; }
  .change-display { display: flex; justify-content: space-between; align-items: center; padding: 4px 7px; border: 2px solid var(--black); border-radius: 3px; font-weight: 700; font-size: 0.88rem; background: var(--gray); }
  .change-display.positive { background: #e6f7ed; border-color: var(--green-light); color: var(--green); }
  .change-display.negative { background: #fdecea; border-color: var(--red); color: var(--red); }
  .charge-btn { width: 100%; padding: 11px; font-family: var(--font); font-size: 0.95rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; background: var(--green); color: var(--yellow); border: 3px solid var(--black); border-radius: 4px; cursor: pointer; box-shadow: 4px 4px 0 var(--black); transition: transform 0.08s, box-shadow 0.08s; }
  .charge-btn:hover:not(:disabled) { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--black); }
  .charge-btn:active:not(:disabled) { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--black); }
  .charge-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; transform: none; }
  .clear-btn { width: 100%; padding: 6px; font-family: var(--font); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; background: transparent; color: var(--red); border: 2px solid var(--red); border-radius: 3px; cursor: pointer; }
  .clear-btn:hover { background: var(--red); color: var(--white); }

  /* ── TOOLBAR (shared) ── */
  .toolbar { display: flex; align-items: center; gap: 8px; padding: 9px 14px; background: var(--green); border-bottom: 2px solid var(--black); flex-shrink: 0; flex-wrap: wrap; }
  .toolbar button { padding: 5px 12px; font-family: var(--font); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; border: 2px solid var(--white); border-radius: 3px; cursor: pointer; color: var(--white); background: transparent; transition: background 0.1s, color 0.1s; white-space: nowrap; }
  .toolbar button:hover { background: var(--white); color: var(--green); }
  .toolbar .danger-btn { border-color: #ff8a80; color: #ff8a80; }
  .toolbar .danger-btn:hover { background: #ff8a80; color: var(--white); }
  .toolbar .accent-btn { background: var(--yellow); color: var(--black); border-color: var(--yellow); }
  .toolbar .accent-btn:hover { background: #ffe066; }
  .toolbar-spacer { flex: 1; }
  .toolbar span { color: var(--white); font-size: 0.72rem; opacity: 0.7; }

  /* ── SALES LOG TAB ── */
  #log-panel { flex-direction: column; overflow: hidden; }
  .summary-bar { display: flex; flex-shrink: 0; border-bottom: 3px solid var(--black); overflow-x: auto; background: var(--yellow); }
  .summary-cell { flex: 1; min-width: 90px; padding: 7px 9px; border-right: 2px solid var(--black); text-align: center; }
  .summary-cell:last-child { border-right: none; }
  .summary-cell .s-label { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--green); font-weight: 700; display: block; }
  .summary-cell .s-value { font-size: 0.95rem; font-weight: 700; display: block; }
  .log-table-wrap { flex: 1; overflow: auto; background: var(--white); }
  table { width: 100%; border-collapse: collapse; font-size: 0.73rem; }
  thead th { background: var(--black); color: var(--yellow); padding: 7px 9px; text-align: left; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; position: sticky; top: 0; white-space: nowrap; z-index: 1; }
  tbody tr { border-bottom: 1px solid var(--gray); }
  tbody tr:hover { background: #fffbe6; }
  tbody td { padding: 6px 9px; vertical-align: top; }
  td.items-cell { max-width: 200px; line-height: 1.5; }
  td.money { font-weight: 700; white-space: nowrap; }
  td.merna-col { color: var(--green); font-weight: 700; }
  td.mila-col { color: #9a6600; font-weight: 700; }
  .pay-badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 0.68rem; font-weight: 700; background: var(--gray); border: 1px solid var(--gray-dark); }
  .pay-badge.cash { background: #e6f7ed; border-color: var(--green-light); color: var(--green); }
  .pay-badge.venmo { background: #e3f0ff; border-color: #3d95ce; color: #1565c0; }
  .pay-badge.square { background: #fff0e0; border-color: #e67e22; color: #e67e22; }
  .pay-badge.zelle { background: #f3e8ff; border-color: #8e44ad; color: #6c3483; }
  .pay-badge.editable { cursor: pointer; }
  .pay-badge.editable:hover { filter: brightness(0.95); }
  .empty-state { padding: 40px; text-align: center; color: var(--gray-dark); font-style: italic; font-size: 0.85rem; }
  .day-filter-bar { display: flex; align-items: center; gap: 5px; padding: 6px 12px; background: var(--black); border-bottom: 2px solid #333; flex-shrink: 0; flex-wrap: wrap; }
  .day-filter-bar .df-label { color: var(--gray-dark); font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; margin-right: 2px; }
  .day-filter-btn { padding: 3px 10px; font-family: var(--font); font-size: 0.68rem; font-weight: 700; border: 1.5px solid #555; border-radius: 3px; cursor: pointer; background: transparent; color: var(--gray-dark); transition: background 0.1s, color 0.1s; white-space: nowrap; }
  .day-filter-btn:hover { background: #333; color: var(--white); }
  .day-filter-btn.active { background: var(--yellow); color: var(--black); border-color: var(--yellow); }
  .overhead-wrap { display: flex; align-items: center; gap: 5px; }
  .overhead-wrap label { color: var(--white); font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap; }
  .overhead-wrap input { padding: 3px 7px; font-family: var(--font); font-size: 0.78rem; border: 2px solid var(--white); border-radius: 3px; background: transparent; color: var(--white); outline: none; width: 90px; }
  .overhead-wrap input:focus { border-color: var(--yellow); }
  .summary-cell.profit-cell .s-value { color: var(--green); }
  .summary-cell.profit-cell.loss .s-value { color: var(--red); }

  /* ── ITEMS TAB ── */
  #items-panel { flex-direction: column; overflow: hidden; }
  .items-body { flex: 1; overflow: auto; background: var(--white); }
  .items-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
  .items-table thead th { background: var(--black); color: var(--yellow); padding: 7px 10px; text-align: left; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; position: sticky; top: 0; z-index: 1; }
  .items-table tbody tr { border-bottom: 1px solid var(--gray); }
  .items-table tbody tr:hover { background: #f8f8f8; }
  .items-table tbody td { padding: 6px 10px; vertical-align: middle; }
  .items-table .merna-cell { color: var(--green); font-weight: 700; }
  .items-table .mila-cell { color: #9a6600; font-weight: 700; }
  .items-table .both-cell { color: var(--green); font-weight: 700; }
  .icon-btn { padding: 3px 8px; font-family: var(--font); font-size: 0.68rem; font-weight: 700; border-radius: 3px; cursor: pointer; border: 1.5px solid; transition: background 0.1s; }
  .edit-btn { border-color: var(--green); color: var(--green); background: transparent; }
  .edit-btn:hover { background: var(--green); color: var(--white); }
  .del-btn { border-color: var(--red); color: var(--red); background: transparent; margin-left: 4px; }
  .del-btn:hover { background: var(--red); color: var(--white); }

  /* ── EVENTS TAB ── */
  #events-panel { flex-direction: column; overflow: hidden; }
  .events-body { flex: 1; overflow: auto; background: var(--white); padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .event-card { border: 2.5px solid var(--black); border-radius: 4px; overflow: hidden; box-shadow: 3px 3px 0 var(--black); }
  .event-card-header { background: var(--green); color: var(--white); padding: 8px 14px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
  .event-card-header h3 { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.06em; }
  .event-card-header .event-meta { font-size: 0.68rem; opacity: 0.75; }
  .event-card-header .event-actions { display: flex; gap: 6px; }
  .event-card-header button { padding: 3px 9px; font-family: var(--font); font-size: 0.65rem; font-weight: 700; border: 1.5px solid rgba(255,255,255,0.6); border-radius: 3px; cursor: pointer; background: transparent; color: var(--white); letter-spacing: 0.05em; }
  .event-card-header button:hover { background: rgba(255,255,255,0.2); }
  .event-card-body { display: none; background: var(--white); }
  .event-card-body.open { display: block; }
  .event-summary-row { display: flex; background: #fffbe6; border-bottom: 1px solid var(--gray); }
  .event-summary-row .summary-cell { min-width: 80px; padding: 6px 8px; border-right: 1px solid var(--gray); }
  .event-summary-row .summary-cell:last-child { border-right: none; }
  .event-mini-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
  .event-mini-table th { background: #f0f0f0; padding: 5px 8px; text-align: left; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; border-bottom: 1px solid var(--gray); }
  .event-mini-table td { padding: 5px 8px; border-bottom: 1px solid var(--gray); }
  .event-mini-table tr:last-child td { border-bottom: none; }
  .settlement-note { padding: 8px; border-bottom: 1px solid var(--gray); background: #f7fbf8; font-size: 0.7rem; line-height: 1.4; }
  .no-events { padding: 40px; text-align: center; color: var(--gray-dark); font-style: italic; }

  /* ── MODAL ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--white); border: 3px solid var(--black); border-radius: 4px; box-shadow: 6px 6px 0 var(--black); padding: 20px 24px; width: 380px; max-width: 95vw; display: flex; flex-direction: column; gap: 12px; }
  .modal h2 { font-size: 0.95rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; border-bottom: 2px solid var(--black); padding-bottom: 8px; }
  .modal label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; display: block; margin-bottom: 3px; }
  .modal input, .modal select { width: 100%; padding: 6px 9px; font-family: var(--font); font-size: 0.85rem; border: 2px solid var(--black); border-radius: 3px; outline: none; background: var(--white); }
  .modal input:focus, .modal select:focus { border-color: var(--green); }
  .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .modal-actions button { padding: 7px 16px; font-family: var(--font); font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em; border: 2px solid var(--black); border-radius: 3px; cursor: pointer; }
  .btn-cancel { background: var(--gray); color: var(--black); }
  .btn-cancel:hover { background: var(--gray-dark); }
  .btn-save { background: var(--green); color: var(--white); border-color: var(--green); }
  .btn-save:hover { background: #005530; }

  /* TOAST */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--green); color: var(--yellow); padding: 10px 24px; border-radius: 4px; font-family: var(--font); font-size: 0.88rem; font-weight: 700; letter-spacing: 0.05em; border: 3px solid var(--black); box-shadow: 4px 4px 0 var(--black); transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275); z-index: 9999; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--green); border-radius: 3px; }
</style>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<header>
  <div class="header-left">
    <img src="logo.png" alt="Garden State Press" class="header-logo">
    <h1>Garden State Press</h1>
    <div class="event-name-wrap">
      <span>EVENT:</span>
      <span id="event-name-display" onclick="startRenameEvent()" title="Click to rename"></span>
      <input type="text" id="event-name-input" onblur="finishRenameEvent()" onkeydown="if(event.key==='Enter')finishRenameEvent();if(event.key==='Escape')cancelRenameEvent()">
    </div>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active"  onclick="switchTab('register')">Register</button>
  <button class="tab-btn"         onclick="switchTab('log')">Sales Log</button>
  <button class="tab-btn"         onclick="switchTab('items')">Items</button>
  <button class="tab-btn"         onclick="switchTab('events')">Events</button>
</div>

<!-- ── REGISTER TAB ── -->
<div id="register-panel" class="tab-panel active">
  <div class="register-search-bar">
    <input type="text" id="search-input" placeholder="Search items..." oninput="filterItems(this.value)">
  </div>
  <div class="register-body">
    <div class="item-grid-wrap">
      <div class="item-grid" id="item-grid"></div>
    </div>
    <div class="order-panel">
      <div class="order-header">Current Order</div>
      <div class="order-items" id="order-items">
        <div class="order-empty" id="order-empty">No items added yet.</div>
      </div>
      <div class="order-footer">
        <div class="subtotal-row">
          <span>SUBTOTAL</span>
          <span id="subtotal-display">$0.00</span>
        </div>
        <div>
          <label>Customer Name</label>
          <input type="text" id="customer-name" placeholder="Enter name..." oninput="updateChargeBtn()">
        </div>
        <div>
          <label>Payment Method</label>
          <div class="payment-btns">
            <button class="pay-btn" onclick="selectPayment('Ca$h')">Ca$h</button>
            <button class="pay-btn" onclick="selectPayment('Venmo')">Venmo</button>
            <button class="pay-btn" onclick="selectPayment('Square')">Square</button>
            <button class="pay-btn" onclick="selectPayment('Zelle')">Zelle</button>
          </div>
        </div>
        <div class="cash-section" id="cash-section">
          <div>
            <label>Amount Tendered ($)</label>
            <input type="number" id="tendered-input" min="0" step="0.01" placeholder="0.00" oninput="updateChange()">
          </div>
          <div class="change-display" id="change-display">
            <span>Change Due</span>
            <span id="change-amount">—</span>
          </div>
        </div>
        <button class="charge-btn" id="charge-btn" onclick="chargeSale()" disabled>CHARGE</button>
        <button class="clear-btn" onclick="clearCart()">Clear Order</button>
      </div>
    </div>
  </div>
</div>

// ── STATE ──
let cart = [];
let payment = null;
let editingItemIdx = null; // null = adding new

const PAYMENT_METHODS = ['Ca$h', 'Venmo', 'Square', 'Zelle'];

// ── FIREBASE ──
firebase.initializeApp({
  apiKey: "AIzaSyD-BmvQ1BIX954DZGyhNk7GLLnPWbgBGZQ",
  authDomain: "gsp-register.firebaseapp.com",

  messagingSenderId: "112109531585",
  appId: "1:112109531585:web:19d66e1d008a79e4abff40"
});
const db = firebase.firestore();
const REFS = {
  catalog: db.collection('gsp').doc('catalog'),
  current: db.collection('gsp').doc('current'),
  archive: db.collection('gsp').doc('archive'),
};

// ── IN-MEMORY STATE (synced from Firestore) ──
let STATE = { catalog: [], eventName: 'New Event', sales: [], events: [], overhead: 0 };

// ── CATALOG STORAGE ──
function getCatalog() { return STATE.catalog; }
function saveCatalog(catalog) {
  STATE.catalog = catalog;
  REFS.catalog.set({ items: catalog }).catch(console.error);
}

// ── EVENT STORAGE ──
function getEventName() { return STATE.eventName; }
function setEventName(name) {
  STATE.eventName = name;
  REFS.current.set({ name, sales: STATE.sales, overhead: STATE.overhead }).catch(console.error);
}
function loadEvents() { return STATE.events; }
function saveEvents(events) {
  STATE.events = events;
  REFS.archive.set({ events }).catch(console.error);
}
function loadSales() { return STATE.sales; }
function saveSales(sales) {
  STATE.sales = sales;
  REFS.current.set({ name: STATE.eventName, sales, overhead: STATE.overhead }).catch(console.error);
}
function getOverhead() { return STATE.overhead || 0; }
function setOverhead(v) {
  STATE.overhead = v;
  REFS.current.set({ name: STATE.eventName, sales: STATE.sales, overhead: v }).catch(console.error);
}
function onOverheadChange() {
  const v = parseFloat(document.getElementById('overhead-input').value) || 0;
  setOverhead(v);
  const sales = loadSales();
  const filtered = logDayFilter ? sales.filter(s => getSaleDay(s) === logDayFilter) : sales;
  renderSummary(filtered, 'summary-bar');
}
function getSaleDay(sale) { return sale.timestamp.split(',')[0].trim(); }
function formatCurrency(v) { return `$${Number(v || 0).toFixed(2)}`; }

function calculateSettlement(sales) {
  const mernaRev = sales.reduce((s, x) => s + (x.mernaRev || 0), 0);
  const milaRev = sales.reduce((s, x) => s + (x.milaRev || 0), 0);
  const cash = sales.filter(x => x.payment === 'Ca$h').reduce((s, x) => s + (x.total || 0), 0);
  const venmo = sales.filter(x => x.payment === 'Venmo').reduce((s, x) => s + (x.total || 0), 0);
  const square = sales.filter(x => x.payment === 'Square').reduce((s, x) => s + (x.total || 0), 0);
  const zelle = sales.filter(x => x.payment === 'Zelle').reduce((s, x) => s + (x.total || 0), 0);
  const milaCollected = cash + venmo;
  const mernaCollected = square + zelle;
  const milaToMerna = Math.max(0, mernaRev - mernaCollected);
  const mernaToMila = Math.max(0, milaRev - milaCollected);
  return {
    cash, venmo, square, zelle,
    milaCollected, mernaCollected,
    milaRev, mernaRev,
    milaToMerna, mernaToMila,
  };
}

// ── INIT ──
async function init() {
  try {
    const [catalogDoc, currentDoc, archiveDoc] = await Promise.all([
      REFS.catalog.get(),
      REFS.current.get(),
      REFS.archive.get(),
    ]);

    STATE.catalog   = catalogDoc.exists ? catalogDoc.data().items          : DEFAULT_CATALOG.map(i => ({...i}));
    STATE.eventName = currentDoc.exists ? currentDoc.data().name           : 'New Event';
    STATE.sales     = currentDoc.exists ? (currentDoc.data().sales || [])  : [];
    STATE.overhead  = currentDoc.exists ? (currentDoc.data().overhead || 0) : 0;
    STATE.events    = archiveDoc.exists ? (archiveDoc.data().events || []) : [];

    // Seed catalog on first run
    if (!catalogDoc.exists) REFS.catalog.set({ items: STATE.catalog }).catch(console.error);

    // Real-time listeners — update UI when another device makes changes
    REFS.catalog.onSnapshot(doc => {
      if (!doc.exists) return;
      STATE.catalog = doc.data().items;
      renderGrid(); renderItems();
    });
    REFS.current.onSnapshot(doc => {
      if (!doc.exists) return;
      STATE.eventName = doc.data().name;
      STATE.sales     = doc.data().sales || [];
      STATE.overhead  = doc.data().overhead || 0;
      const inp = document.getElementById('overhead-input');
      if (inp && document.activeElement !== inp) inp.value = STATE.overhead || '';
      updateEventNameDisplay(); renderLog();
    });
    REFS.archive.onSnapshot(doc => {
      if (!doc.exists) return;
      STATE.events = doc.data().events || [];
      renderEvents();
    });

  } catch (e) {
    console.error('Firebase load failed, falling back to defaults:', e);
    STATE.catalog = DEFAULT_CATALOG.map(i => ({...i}));
  }

  updateEventNameDisplay();
  document.getElementById('overhead-input').value = getOverhead() || '';
  renderGrid();
  renderLog();
  renderItems();
  renderEvents();
}

// ── EVENT NAME ──
function updateEventNameDisplay() {
  document.getElementById('event-name-display').textContent = getEventName();
}
function startRenameEvent() {
  const input = document.getElementById('event-name-input');
  const display = document.getElementById('event-name-display');
  input.value = getEventName();
  display.style.display = 'none';
  input.style.display = '';
  input.focus();
  input.select();
}
function finishRenameEvent() {
  const input = document.getElementById('event-name-input');
  const val = input.value.trim();
  if (val) { setEventName(val); updateEventNameDisplay(); }
  input.style.display = 'none';
  document.getElementById('event-name-display').style.display = '';
}
function cancelRenameEvent() {
  document.getElementById('event-name-input').style.display = 'none';
  document.getElementById('event-name-display').style.display = '';
}

// ── NEW EVENT (no archive) ──
function newEventNoArchive() {
  const currentSales = loadSales();
  const currentName = getEventName();
  const warning = currentSales.length > 0
    ? `Start a new event? "${currentName}" has ${currentSales.length} sale(s) that will NOT be archived and will be lost.`
    : `Start a new event? "${currentName}" will be discarded.`;
  if (!confirm(warning)) return;
  const newName = prompt('Name for the new event:', 'New Event');
  if (!newName) return;
  saveSales([]);
  STATE.overhead = 0;
  setEventName(newName.trim());
  clearCart();
  updateEventNameDisplay();
  document.getElementById('overhead-input').value = '';
  renderLog();
  showToast(`Started new event: ${newName.trim()}`);
  switchTab('register');
}

// ── SAVE & NEW EVENT ──
function saveAndNewEvent() {
  const currentSales = loadSales();
  const currentName = getEventName();
  if (currentSales.length === 0 && !confirm(`Archive "${currentName}" (no sales recorded) and start a new event?`)) return;
  if (currentSales.length > 0) {
    const ok = confirm(`Archive "${currentName}" with ${currentSales.length} sale(s) and start a new event?`);
    if (!ok) return;
  }
  const newName = prompt('Name for the new event:', 'New Event');
  if (!newName) return;

  // Archive current
  const events = loadEvents();
  events.push({
    name: currentName,
    createdAt: currentSales.length ? currentSales[0].timestamp : new Date().toLocaleString(),
    closedAt: new Date().toLocaleString(),
    sales: currentSales,
    overhead: getOverhead(),
    settlement: calculateSettlement(currentSales),
  });
  saveEvents(events);

  // Reset current
  saveSales([]);
  STATE.overhead = 0;
  setEventName(newName.trim());
  clearCart();
  updateEventNameDisplay();
  document.getElementById('overhead-input').value = '';
  renderLog();
  renderEvents();
  showToast(`"${currentName}" archived. Starting: ${newName.trim()}`);
  switchTab('register');
}

function closeEventWithSettlement() {
  const currentSales = loadSales();
  const currentName = getEventName();
  if (!currentSales.length) {
    alert('No sales recorded for this event yet.');
    return;
  }

  const settlement = calculateSettlement(currentSales);
  const direction = settlement.milaToMerna > 0
    ? `Mila Venmos Merna: ${formatCurrency(settlement.milaToMerna)}`
    : settlement.mernaToMila > 0
      ? `Merna owes Mila: ${formatCurrency(settlement.mernaToMila)}`
      : 'No transfer needed';

  const summary = [
    `Close "${currentName}"?`,
    '',
    `Mila collected (Ca$h + Venmo): ${formatCurrency(settlement.milaCollected)}`,
    `Merna collected (Square + Zelle): ${formatCurrency(settlement.mernaCollected)}`,
    `Mila revenue: ${formatCurrency(settlement.milaRev)}`,
    `Merna revenue: ${formatCurrency(settlement.mernaRev)}`,
    direction,
  ].join('\n');

  if (!confirm(summary)) return;

  const newName = prompt('Name for the new event:', 'New Event');
  if (!newName) return;

  const events = loadEvents();
  events.push({
    name: currentName,
    createdAt: currentSales.length ? currentSales[0].timestamp : new Date().toLocaleString(),
    closedAt: new Date().toLocaleString(),
    sales: currentSales,
    overhead: getOverhead(),
    settlement,
  });
  saveEvents(events);

  saveSales([]);
  STATE.overhead = 0;
  setEventName(newName.trim());
  clearCart();
  updateEventNameDisplay();
  document.getElementById('overhead-input').value = '';
  renderLog();
  renderEvents();
  showToast(direction);
  switchTab('register');
}

// ── ITEM GRID ──
function renderGrid() {
  const catalog = getCatalog();
  const grid = document.getElementById('item-grid');
  grid.innerHTML = '';
  catalog.forEach((item, i) => {
    const btn = document.createElement('button');
    btn.className = `item-btn ${item.seller.toLowerCase()}`;
    btn.dataset.idx = i;
    btn.innerHTML = `<span>${escHtml(item.name)}</span><span class="price">$${item.price}</span><span class="seller-tag">${item.seller}</span>`;
    btn.addEventListener('click', () => addToCart(i));
    grid.appendChild(btn);
  });
  const q = document.getElementById('search-input').value;
  if (q) filterItems(q);
}

function filterItems(query) {
  const catalog = getCatalog();
  const q = query.trim().toLowerCase();
  let anyVisible = false;
  document.querySelectorAll('.item-btn').forEach(btn => {
    const item = catalog[btn.dataset.idx];
    if (!item) return;
    const match = !q || item.name.toLowerCase().includes(q);
    btn.classList.toggle('hidden', !match);
    if (match) anyVisible = true;
  });
  let noResults = document.querySelector('.no-results');
  if (!anyVisible && q) {
    if (!noResults) { noResults = document.createElement('div'); noResults.className = 'no-results'; document.getElementById('item-grid').appendChild(noResults); }
    noResults.textContent = `No items matching "${query}"`;
  } else if (noResults) { noResults.remove(); }
}

// ── CART ──
function addToCart(idx) {
  const catalog = getCatalog();
  const item = catalog[idx];
  if (!item) return;
  // Match by name+seller (snapshot already in cart)
  const existing = cart.find(c => c.item.name === item.name && c.item.seller === item.seller);
  if (existing) { existing.qty++; }
  else { cart.push({ item: { ...item }, qty: 1 }); }
  renderCart();
  updateChargeBtn();
}
function changeQty(idx, delta) {
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  renderCart(); updateChargeBtn();
  if (payment === 'Ca$h') updateChange();
}
function removeFromCart(idx) {
  cart.splice(idx, 1);
  renderCart(); updateChargeBtn();
  if (payment === 'Ca$h') updateChange();
}
function renderCart() {
  const container = document.getElementById('order-items');
  container.querySelectorAll('.order-line').forEach(el => el.remove());
  const emptyMsg = document.getElementById('order-empty');
  if (cart.length === 0) {
    emptyMsg.style.display = '';
    document.getElementById('subtotal-display').textContent = '$0.00';
    return;
  }
  emptyMsg.style.display = 'none';
  let subtotal = 0;
  cart.forEach((c, i) => {
    subtotal += c.item.price * c.qty;
    const line = document.createElement('div');
    line.className = 'order-line';
    line.innerHTML = `
      <span class="order-line-name">${escHtml(c.item.name)}</span>
      <div class="qty-controls">
        <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
        <span class="qty-num">${c.qty}</span>
        <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
      </div>
      <span class="order-line-price">$${(c.item.price * c.qty).toFixed(2)}</span>
      <button class="remove-btn" onclick="removeFromCart(${i})">✕</button>`;
    container.appendChild(line);
  });
  document.getElementById('subtotal-display').textContent = `$${subtotal.toFixed(2)}`;
}
function clearCart() {
  cart = []; payment = null;
  document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('cash-section').classList.remove('visible');
  document.getElementById('customer-name').value = '';
  document.getElementById('tendered-input').value = '';
  document.getElementById('change-amount').textContent = '—';
  document.getElementById('change-display').className = 'change-display';
  renderCart(); updateChargeBtn();
}
function getSubtotal() { return cart.reduce((s, c) => s + c.item.price * c.qty, 0); }

// ── PAYMENT ──
function selectPayment(method) {
  payment = method;
  document.querySelectorAll('.pay-btn').forEach(b => b.classList.toggle('selected', b.textContent.trim() === method));
  const cs = document.getElementById('cash-section');
  if (method === 'Ca$h') { cs.classList.add('visible'); updateChange(); }
  else cs.classList.remove('visible');
  updateChargeBtn();
}
function updateChange() {
  const tendered = parseFloat(document.getElementById('tendered-input').value) || 0;
  const change = tendered - getSubtotal();
  const display = document.getElementById('change-display');
  const amount = document.getElementById('change-amount');
  if (!tendered) { amount.textContent = '—'; display.className = 'change-display'; }
  else if (change >= 0) { amount.textContent = `$${change.toFixed(2)}`; display.className = 'change-display positive'; }
  else { amount.textContent = `-$${Math.abs(change).toFixed(2)}`; display.className = 'change-display negative'; }
  updateChargeBtn();
}
function updateChargeBtn() {
  const hasItems = cart.length > 0;
  const hasName = document.getElementById('customer-name').value.trim().length > 0;
  const hasPayment = !!payment;
  let cashOk = true;
  if (payment === 'Ca$h') { const t = parseFloat(document.getElementById('tendered-input').value)||0; cashOk = t >= getSubtotal() && getSubtotal() > 0; }
  document.getElementById('charge-btn').disabled = !(hasItems && hasName && hasPayment && cashOk);
}

// ── CHARGE SALE ──
function chargeSale() {
  const customer = document.getElementById('customer-name').value.trim();
  const subtotal = getSubtotal();
  const mernaRev = cart.reduce((s, c) => {
    if (c.item.seller === 'Merna') return s + c.item.price * c.qty;
    if (c.item.seller === 'Both')  return s + (c.item.price * c.qty) / 2;
    return s;
  }, 0);
  const milaRev  = cart.reduce((s, c) => {
    if (c.item.seller === 'Mila') return s + c.item.price * c.qty;
    if (c.item.seller === 'Both') return s + (c.item.price * c.qty) / 2;
    return s;
  }, 0);
  const sale = {
    id: Date.now(),
    timestamp: new Date().toLocaleString(),
    customer,
    items: cart.map(c => ({ name: c.item.name, price: c.item.price, seller: c.item.seller, qty: c.qty })),
    total: subtotal, payment, mernaRev, milaRev,
  };
  const sales = loadSales();
  sales.push(sale);
  saveSales(sales);
  playKaching();
  showToast(`Sale recorded! $${subtotal.toFixed(2)} via ${payment}`);
  clearCart();
  renderLog();
}

// ── SALES LOG ──
function renderLog() {
  const sales = loadSales();
  const tbody = document.getElementById('log-tbody');
  const empty = document.getElementById('log-empty');
  document.getElementById('log-count').textContent = `${sales.length} sale${sales.length !== 1 ? 's' : ''}`;

  // Build day filter bar
  const days = [...new Set(sales.map(s => getSaleDay(s)))];
  const dfBar = document.getElementById('day-filter-bar');
  if (days.length > 1) {
    dfBar.style.display = '';
    if (logDayFilter && !days.includes(logDayFilter)) logDayFilter = null;
    dfBar.innerHTML = '<span class="df-label">Day:</span>' +
      ['All', ...days].map(d => {
        const isActive = d === 'All' ? !logDayFilter : logDayFilter === d;
        return `<button class="day-filter-btn${isActive?' active':''}" onclick="setDayFilter(${d==='All'?'null':'\''+d+'\''})">${escHtml(d)}</button>`;
      }).join('');
  } else {
    dfBar.style.display = 'none';
    logDayFilter = null;
  }

  const filtered = logDayFilter ? sales.filter(s => getSaleDay(s) === logDayFilter) : sales;
  renderSummary(filtered, 'summary-bar');

  if (!sales.length) { tbody.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  const rows = [...filtered].reverse();
  tbody.innerHTML = rows.map((sale) => {
    const num = sales.indexOf(sale) + 1;
    const itemsText = sale.items.map(it => `${it.qty}× ${escHtml(it.name)} ($${it.price})`).join('<br>');
    const pc = { 'Ca$h':'cash','Venmo':'venmo','Square':'square','Zelle':'zelle' }[sale.payment]||'';
    return `<tr><td>${num}</td><td style="white-space:nowrap;font-size:0.68rem">${sale.timestamp}</td><td>${escHtml(sale.customer)}</td><td class="items-cell">${itemsText}</td><td class="money">$${sale.total.toFixed(2)}</td><td><span class="pay-badge editable ${pc}" title="Edit payment" onclick="editSalePayment(${sale.id})">${sale.payment}</span></td><td class="money merna-col">$${sale.mernaRev.toFixed(2)}</td><td class="money mila-col">$${sale.milaRev.toFixed(2)}</td></tr>`;
  }).join('');
  if (!rows.length) empty.style.display = '';
}

function editSalePayment(saleId) {
  const sales = loadSales();
  const idx = sales.findIndex(s => s.id === saleId);
  if (idx === -1) return;
  const current = sales[idx].payment;
  const input = prompt(`Payment method (${PAYMENT_METHODS.join(', ')}):`, current);
  if (!input) return;

  const norm = input.trim().toLowerCase();
  const next = PAYMENT_METHODS.find(m => m.toLowerCase() === norm);
  if (!next) {
    alert(`Invalid payment method. Use: ${PAYMENT_METHODS.join(', ')}`);
    return;
  }
  if (next === current) return;

  sales[idx].payment = next;
  saveSales(sales);
  renderLog();
  showToast(`Payment updated to ${next}.`);
}

function setDayFilter(day) {
  logDayFilter = day;
  renderLog();
}

function renderSummary(sales, containerId) {
  const m  = sales.reduce((s,x)=>s+x.mernaRev,0);
  const mi = sales.reduce((s,x)=>s+x.milaRev,0);
  const ca = sales.filter(x=>x.payment==='Ca$h').reduce((s,x)=>s+x.total,0);
  const ve = sales.filter(x=>x.payment==='Venmo').reduce((s,x)=>s+x.total,0);
  const sq = sales.filter(x=>x.payment==='Square').reduce((s,x)=>s+x.total,0);
  const ze = sales.filter(x=>x.payment==='Zelle').reduce((s,x)=>s+x.total,0);
  const gt = sales.reduce((s,x)=>s+x.total,0);
  const overhead = getOverhead();
  const profit = gt - overhead;
  const profitClass = profit < 0 ? ' loss' : '';
  document.getElementById(containerId).innerHTML = `
    <div class="summary-cell"><span class="s-label">Merna Rev</span><span class="s-value">$${m.toFixed(2)}</span></div>
    <div class="summary-cell"><span class="s-label">Mila Rev</span><span class="s-value">$${mi.toFixed(2)}</span></div>
    <div class="summary-cell"><span class="s-label">Ca$h</span><span class="s-value">$${ca.toFixed(2)}</span></div>
    <div class="summary-cell"><span class="s-label">Venmo</span><span class="s-value">$${ve.toFixed(2)}</span></div>
    <div class="summary-cell"><span class="s-label">Square</span><span class="s-value">$${sq.toFixed(2)}</span></div>
    <div class="summary-cell"><span class="s-label">Zelle</span><span class="s-value">$${ze.toFixed(2)}</span></div>
    <div class="summary-cell"><span class="s-label">Total</span><span class="s-value">$${gt.toFixed(2)}</span></div>
    <div class="summary-cell profit-cell${profitClass}"><span class="s-label">Net Profit</span><span class="s-value">${profit<0?'-':''}$${Math.abs(profit).toFixed(2)}</span></div>`;
}

function clearLog() {
  if (confirm('Delete ALL sales for the current event? This cannot be undone.')) {
    saveSales([]); renderLog(); showToast('Sales log cleared.');
  }
}

// ── EXPORT CSV ──
function exportCSV(sales, eventName) {
  if (!sales.length) { showToast('No sales to export.'); return; }
  const headers = ['Sale #','Event','Timestamp','Customer','Items','Total','Payment','Merna Rev','Mila Rev'];
  const rows = [...sales].reverse().map((sale, i) => [
    sales.length - i, eventName, sale.timestamp, sale.customer,
    sale.items.map(it=>`${it.qty}x ${it.name}`).join('; '),
    sale.total.toFixed(2), sale.payment, sale.mernaRev.toFixed(2), sale.milaRev.toFixed(2),
  ]);
  downloadCSV([headers,...rows], `gsp-${eventName.replace(/\s+/g,'-')}-${new Date().toISOString().slice(0,10)}.csv`);
}
function exportAllEventsCSV() {
  const all = [
    { name: getEventName(), sales: loadSales() },
    ...loadEvents().map(e => ({ name: e.name, sales: e.sales })),
  ];
  const headers = ['Sale #','Event','Timestamp','Customer','Items','Total','Payment','Merna Rev','Mila Rev'];
  const rows = [];
  all.forEach(ev => {
    ev.sales.forEach((sale, i) => {
      rows.push([i+1, ev.name, sale.timestamp, sale.customer,
        sale.items.map(it=>`${it.qty}x ${it.name}`).join('; '),
        sale.total.toFixed(2), sale.payment, sale.mernaRev.toFixed(2), sale.milaRev.toFixed(2)]);
    });
  });
  if (!rows.length) { showToast('No sales to export.'); return; }
  downloadCSV([headers,...rows], `gsp-all-events-${new Date().toISOString().slice(0,10)}.csv`);
}
function downloadCSV(data, filename) {
  const csv = data.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = filename; a.click();
  URL.revokeObjectURL(a.href);
}

// ── ITEMS TAB ──
function renderItems() {
  const catalog = getCatalog();
  const tbody = document.getElementById('items-tbody');
  tbody.innerHTML = catalog.map((item, i) => `
    <tr>
      <td>${escHtml(item.name)}</td>
      <td>$${Number(item.price).toFixed(2)}</td>
      <td class="${item.seller.toLowerCase()}-cell">${item.seller}</td>
      <td>${item.category}</td>
      <td style="white-space:nowrap">
        <button class="icon-btn edit-btn" onclick="openItemModal(${i})">Edit</button>
        <button class="icon-btn del-btn" onclick="deleteItem(${i})">Delete</button>
      </td>
    </tr>`).join('');
}

function openItemModal(idx) {
  editingItemIdx = (idx !== undefined) ? idx : null;
  document.getElementById('modal-title').textContent = editingItemIdx !== null ? 'Edit Item' : 'Add Item';
  if (editingItemIdx !== null) {
    const item = getCatalog()[editingItemIdx];
    document.getElementById('modal-name').value = item.name;
    document.getElementById('modal-price').value = item.price;
    document.getElementById('modal-seller').value = item.seller;
    document.getElementById('modal-category').value = item.category;
  } else {
    document.getElementById('modal-name').value = '';
    document.getElementById('modal-price').value = '';
    document.getElementById('modal-seller').value = 'Merna';
    document.getElementById('modal-category').value = 'sticker';
  }
  document.getElementById('item-modal').classList.add('open');
  document.getElementById('modal-name').focus();
}
function closeItemModal() { document.getElementById('item-modal').classList.remove('open'); }
function saveItem() {
  const name = document.getElementById('modal-name').value.trim();
  const price = parseFloat(document.getElementById('modal-price').value);
  const seller = document.getElementById('modal-seller').value;
  const category = document.getElementById('modal-category').value;
  if (!name) { alert('Item name is required.'); return; }
  if (isNaN(price) || price < 0) { alert('Enter a valid price.'); return; }
  const catalog = getCatalog();
  if (editingItemIdx !== null) {
    catalog[editingItemIdx] = { name, price, seller, category };
    showToast('Item updated.');
  } else {
    catalog.push({ name, price, seller, category });
    showToast('Item added.');
  }
  saveCatalog(catalog);
  closeItemModal();
  renderItems();
  renderGrid();
}
function deleteItem(idx) {
  const catalog = getCatalog();
  if (!confirm(`Delete "${catalog[idx].name}"?`)) return;
  catalog.splice(idx, 1);
  saveCatalog(catalog);
  renderItems();
  renderGrid();
  showToast('Item deleted.');
}
function resetCatalog() {
  if (!confirm('Reset catalog to original defaults? All custom items and edits will be lost.')) return;
  localStorage.removeItem('gsp_catalog');
  renderItems();
  renderGrid();
  showToast('Catalog reset to defaults.');
}

// ── LOAD ARCHIVED EVENT ──
function loadEvent(idx) {
  const events = loadEvents();
  const target = events[idx];
  const currentSales = loadSales();
  const currentName = getEventName();

  if (currentSales.length > 0) {
    const archive = confirm(`Archive current event "${currentName}" (${currentSales.length} sale(s)) before switching?\n\nOK = Archive it    Cancel = Discard it`);
    if (archive) {
      events.push({
        name: currentName,
        createdAt: currentSales[0].timestamp,
        closedAt: new Date().toLocaleString(),
        sales: currentSales,
        overhead: getOverhead(),
        settlement: calculateSettlement(currentSales),
      });
    }
  }

  const newIdx = events.indexOf(target);
  if (newIdx !== -1) events.splice(newIdx, 1);
  saveEvents(events);

  saveSales(target.sales);
  setEventName(target.name);
  clearCart();
  updateEventNameDisplay();
  renderLog();
  renderEvents();
  showToast(`Switched to: ${target.name}`);
  switchTab('register');
}

// ── EVENTS TAB ──
function renderEvents() {
  const events = loadEvents();
  const body = document.getElementById('events-body');
  document.getElementById('events-count').textContent = `${events.length} archived event${events.length !== 1 ? 's' : ''}`;
  if (!events.length) { body.innerHTML = '<div class="no-events">No archived events yet.<br>Use "Save &amp; New Event" in the Sales Log tab to archive an event.</div>'; return; }
  body.innerHTML = [...events].reverse().map((ev, ri) => {
    const i = events.length - 1 - ri; // real index
    const gt = ev.sales.reduce((s,x)=>s+x.total,0);
    const mr = ev.sales.reduce((s,x)=>s+x.mernaRev,0);
    const ml = ev.sales.reduce((s,x)=>s+x.milaRev,0);
    const settlement = ev.settlement || calculateSettlement(ev.sales);
    const settlementMsg = settlement.milaToMerna > 0
      ? `Mila Venmoed Merna ${formatCurrency(settlement.milaToMerna)}`
      : settlement.mernaToMila > 0
        ? `Merna owed Mila ${formatCurrency(settlement.mernaToMila)}`
        : 'No settlement transfer';
    const rowsHtml = ev.sales.length ? [...ev.sales].reverse().map((sale, si) => {
      const num = ev.sales.length - si;
      const pc = {'Ca$h':'cash','Venmo':'venmo','Square':'square','Zelle':'zelle'}[sale.payment]||'';
      return `<tr><td>${num}</td><td style="font-size:0.65rem;white-space:nowrap">${sale.timestamp}</td><td>${escHtml(sale.customer)}</td><td class="items-cell">${sale.items.map(it=>`${it.qty}× ${escHtml(it.name)}`).join(', ')}</td><td class="money">$${sale.total.toFixed(2)}</td><td><span class="pay-badge ${pc}">${sale.payment}</span></td><td class="money merna-col">$${sale.mernaRev.toFixed(2)}</td><td class="money mila-col">$${sale.milaRev.toFixed(2)}</td></tr>`;
    }).join('') : '<tr><td colspan="8" style="padding:12px;text-align:center;color:#bbb;font-style:italic">No sales</td></tr>';
    return `<div class="event-card">
      <div class="event-card-header" onclick="toggleEvent(this)">
        <div>
          <h3>${escHtml(ev.name)}</h3>
          <div class="event-meta">${ev.closedAt} · ${ev.sales.length} sale${ev.sales.length!==1?'s':''} · Total: $${gt.toFixed(2)}</div>
        </div>
        <div class="event-actions" onclick="event.stopPropagation()">
          <button onclick="exportCSV(${JSON.stringify(ev.sales).replace(/"/g,'&quot;')}, '${escHtml(ev.name).replace(/'/g,"\\'")}')">Export CSV</button>
          <button onclick="renameEvent(${i})">Rename</button>
          <button onclick="loadEvent(${i})">Load</button>
          <button onclick="deleteEvent(${i})" style="border-color:#ff8a80;color:#ff8a80">Delete</button>
        </div>
      </div>
      <div class="event-card-body">
        <div class="event-summary-row">
          <div class="summary-cell"><span class="s-label">Merna</span><span class="s-value">$${mr.toFixed(2)}</span></div>
          <div class="summary-cell"><span class="s-label">Mila</span><span class="s-value">$${ml.toFixed(2)}</span></div>
          <div class="summary-cell"><span class="s-label">Total</span><span class="s-value">$${gt.toFixed(2)}</span></div>
          <div class="summary-cell"><span class="s-label">Overhead</span><span class="s-value">$${(ev.overhead||0).toFixed(2)}</span></div>
          <div class="summary-cell profit-cell${(gt-(ev.overhead||0))<0?' loss':''}"><span class="s-label">Net Profit</span><span class="s-value">${(gt-(ev.overhead||0))<0?'-':''}$${Math.abs(gt-(ev.overhead||0)).toFixed(2)}</span></div>
        </div>
        <div class="settlement-note">
          Mila collected (Ca$h+Venmo): ${formatCurrency(settlement.milaCollected)} · Merna collected (Square+Zelle): ${formatCurrency(settlement.mernaCollected)} · ${settlementMsg}
        </div>
        <table class="event-mini-table">
          <thead><tr><th>#</th><th>Time</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Merna</th><th>Mila</th></tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}
function toggleEvent(header) {
  header.nextElementSibling.classList.toggle('open');
}
function renameEvent(idx) {
  const events = loadEvents();
  const newName = prompt('Rename event:', events[idx].name);
  if (!newName || !newName.trim()) return;
  events[idx].name = newName.trim();
  saveEvents(events);
  renderEvents();
  showToast('Event renamed.');
}

function deleteEvent(idx) {
  const events = loadEvents();
  if (!confirm(`Delete event "${events[idx].name}" and all its sales?`)) return;
  events.splice(idx, 1);
  saveEvents(events);
  renderEvents();
  showToast('Event deleted.');
}

// ── KA-CHING ──
function playKaching() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;

    // "Ka" — short noise burst (mechanical drawer)
    const bufSize = Math.floor(ctx.sampleRate * 0.06);
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 2);
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.4, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    noise.connect(noiseGain);
    noiseGain.connect(ctx.destination);
    noise.start(now);

    // "Ching" — bright bell ring
    const osc = ctx.createOscillator();
    const oscGain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1400, now + 0.06);
    oscGain.gain.setValueAtTime(0, now + 0.06);
    oscGain.gain.linearRampToValueAtTime(0.5, now + 0.08);
    oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
    osc.connect(oscGain);
    oscGain.connect(ctx.destination);
    osc.start(now + 0.06);
    osc.stop(now + 0.7);
  } catch(e) { /* audio not supported */ }
}

// ── TABS ──
function switchTab(tab) {
  const tabs = ['register','log','items','events'];
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', tabs[i]===tab));
  tabs.forEach(t => document.getElementById(t+'-panel').classList.toggle('active', t===tab));
  if (tab==='log') { document.getElementById('overhead-input').value = getOverhead() || ''; renderLog(); }
  if (tab==='items') renderItems();
  if (tab==='events') renderEvents();
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

// ── UTILS ──
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Close modal on overlay click
document.getElementById('item-modal').addEventListener('click', function(e) { if (e.target===this) closeItemModal(); });

init();
</script>
